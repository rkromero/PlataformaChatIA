name: Push WAHA Plus to GHCR

on:
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/waha-plus

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Login to Docker Hub (patron)
        run: echo "${{ secrets.WAHA_PATRON_KEY }}" | docker login -u devlikeapro --password-stdin

      - name: Pull WAHA Plus
        run: docker pull devlikeapro/waha-plus

      - name: Logout Docker Hub
        run: docker logout

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Tag and push to GHCR
        run: |
          docker tag devlikeapro/waha-plus ${{ env.GHCR_IMAGE }}:latest
          docker push ${{ env.GHCR_IMAGE }}:latest

      - name: Logout GHCR
        run: docker logout ghcr.io
